<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Rapi</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f9b0f, #00c853);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* kalkulator */
.kalkulator {
    background: #1b5e20;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    width: 280px;
}

/* history */
.history {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px;
    height: 90px;
    overflow-y: auto;
    color: white;
    font-size: 13px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

/* layar */
#layar {
    width: 100%;
    height: 50px;
    font-size: 20px;
    text-align: right;
    padding: 10px;
    border: none;
    border-radius: 10px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

/* grid tombol */
.tombol {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* tombol */
button {
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* warna */
.angka { background: #2e7d32; color: white; }
.operator { background: #66bb6a; }
.equal { background: #00e676; grid-column: span 2; }
.clear { background: #ff1744; color: white; }
.del { background: #37474f; color: white; }

/* isi history biar rapi */
.history div {
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}
</style>

</head>
<body>

<div class="kalkulator">

    <!-- HISTORY -->
    <div class="history" id="listHistory"></div>

    <!-- LAYAR -->
    <input type="text" id="layar" readonly>

    <!-- TOMBOL -->
    <div class="tombol">
        <button class="clear" onclick="clearLayar()">C</button>
        <button class="del" onclick="hapusSatu()">DEL</button>
        <button class="operator" onclick="inputAngka('/')">÷</button>
        <button class="operator" onclick="inputAngka('*')">×</button>

        <button class="angka" onclick="inputAngka('7')">7</button>
        <button class="angka" onclick="inputAngka('8')">8</button>
        <button class="angka" onclick="inputAngka('9')">9</button>
        <button class="operator" onclick="inputAngka('-')">−</button>

        <button class="angka" onclick="inputAngka('4')">4</button>
        <button class="angka" onclick="inputAngka('5')">5</button>
        <button class="angka" onclick="inputAngka('6')">6</button>
        <button class="operator" onclick="inputAngka('+')">+</button>

        <button class="angka" onclick="inputAngka('1')">1</button>
        <button class="angka" onclick="inputAngka('2')">2</button>
        <button class="angka" onclick="inputAngka('3')">3</button>
        <button class="angka" onclick="inputAngka('.')">.</button>

        <button class="angka" onclick="inputAngka('0')">0</button>
        <button class="equal" onclick="hitung()">=</button>
    </div>

</div>

<script>
function inputAngka(angka) {
    document.getElementById("layar").value += angka;
}

function clearLayar() {
    document.getElementById("layar").value = "";
}

function hapusSatu() {
    let layar = document.getElementById("layar");
    layar.value = layar.value.slice(0, -1);
}

function hitung() {
    let layar = document.getElementById("layar");
    try {
        let ekspresi = layar.value;
        let hasil = eval(ekspresi);

        layar.value = hasil;

        tambahHistory(ekspresi + " = " + hasil);

    } catch {
        alert("Input tidak valid!");
    }
}

function tambahHistory(teks) {
    let history = document.getElementById("listHistory");
    let item = document.createElement("div");
    item.textContent = teks;
    history.prepend(item);
}
</script>

</body>
</html>
