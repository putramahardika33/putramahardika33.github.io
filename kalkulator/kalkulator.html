<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Modern</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f9b0f, #00c853);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* kalkulator */
.kalkulator {
    background: #1b5e20;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    width: 280px;
}

/* layar gabungan */
.display {
    background: #0d3b12;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
    color: white;
}

/* history kecil */
#history {
    font-size: 14px;
    opacity: 0.7;
    text-align: right;
    min-height: 20px;
}

/* hasil besar */
#hasil {
    font-size: 26px;
    text-align: right;
    font-weight: bold;
}

/* tombol */
.tombol {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* warna */
.angka { background: #2e7d32; color: white; }
.operator { background: #66bb6a; }
.equal { background: #00e676; grid-column: span 2; }
.clear { background: #ff1744; color: white; }
.del { background: #37474f; color: white; }
</style>

</head>
<body>

<div class="kalkulator">

    <!-- DISPLAY GABUNGAN -->
    <div class="display">
        <div id="history"></div>
        <div id="hasil">0</div>
    </div>

    <!-- TOMBOL -->
    <div class="tombol">
        <button class="clear" onclick="clearAll()">C</button>
        <button class="del" onclick="hapusSatu()">DEL</button>
        <button class="operator" onclick="inputAngka('/')">÷</button>
        <button class="operator" onclick="inputAngka('*')">×</button>

        <button class="angka" onclick="inputAngka('7')">7</button>
        <button class="angka" onclick="inputAngka('8')">8</button>
        <button class="angka" onclick="inputAngka('9')">9</button>
        <button class="operator" onclick="inputAngka('-')">−</button>

        <button class="angka" onclick="inputAngka('4')">4</button>
        <button class="angka" onclick="inputAngka('5')">5</button>
        <button class="angka" onclick="inputAngka('6')">6</button>
        <button class="operator" onclick="inputAngka('+')">+</button>

        <button class="angka" onclick="inputAngka('1')">1</button>
        <button class="angka" onclick="inputAngka('2')">2</button>
        <button class="angka" onclick="inputAngka('3')">3</button>
        <button class="angka" onclick="inputAngka('.')">.</button>

        <button class="angka" onclick="inputAngka('0')">0</button>
        <button class="equal" onclick="hitung()">=</button>
    </div>

</div>

<script>
let ekspresi = "";

// input angka/operator
function inputAngka(angka) {
    ekspresi += angka;
    document.getElementById("hasil").textContent = ekspresi;
}

// hapus semua
function clearAll() {
    ekspresi = "";
    document.getElementById("hasil").textContent = "0";
    document.getElementById("history").textContent = "";
}

// hapus satu
function hapusSatu() {
    ekspresi = ekspresi.slice(0, -1);
    document.getElementById("hasil").textContent = ekspresi || "0";
}

// hitung
function hitung() {
    try {
        let hasil = eval(ekspresi);

        document.getElementById("history").textContent = ekspresi + " =";
        document.getElementById("hasil").textContent = hasil;

        ekspresi = hasil.toString();

    } catch {
        alert("Input tidak valid!");
    }
}
</script>

</body>
</html>
