<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator UI Gradient</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #c218ff, #2196f3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* card */
.kalkulator {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 20px;
    border-radius: 25px;
    width: 320px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.3);
}

/* display */
.display {
    background: #eef1f5;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
    height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* history */
#history {
    font-size: 14px;
    color: #555;
    text-align: right;
}

/* hasil */
#hasil {
    font-size: 36px;
    text-align: right;
    font-weight: bold;
    color: #111;
}

/* tombol */
.tombol {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

button {
    height: 60px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

button:active {
    transform: scale(0.95);
}

/* angka */
.angka {
    background: linear-gradient(145deg, #ffffff, #dfe3eb);
}

/* operator */
.operator {
    background: linear-gradient(145deg, #ffcc33, #ff9800);
    color: white;
}

/* equal */
.equal {
    background: linear-gradient(145deg, #00e676, #00c853);
    color: white;
    grid-column: span 2;
}

/* clear */
.clear {
    background: linear-gradient(145deg, #ff5252, #ff1744);
    color: white;
}

/* del */
.del {
    background: linear-gradient(145deg, #b0bec5, #78909c);
    color: white;
}
</style>

</head>
<body>

<div class="kalkulator">

    <!-- display -->
    <div class="display">
        <div id="history"></div>
        <div id="hasil">0</div>
    </div>

    <!-- tombol -->
    <div class="tombol">
        <button class="clear" onclick="clearAll()">C</button>
        <button class="del" onclick="hapusSatu()">DEL</button>
        <button class="operator" onclick="inputAngka('/')">÷</button>
        <button class="operator" onclick="inputAngka('*')">×</button>

        <button class="angka" onclick="inputAngka('7')">7</button>
        <button class="angka" onclick="inputAngka('8')">8</button>
        <button class="angka" onclick="inputAngka('9')">9</button>
        <button class="operator" onclick="inputAngka('-')">−</button>

        <button class="angka" onclick="inputAngka('4')">4</button>
        <button class="angka" onclick="inputAngka('5')">5</button>
        <button class="angka" onclick="inputAngka('6')">6</button>
        <button class="operator" onclick="inputAngka('+')">+</button>

        <button class="angka" onclick="inputAngka('1')">1</button>
        <button class="angka" onclick="inputAngka('2')">2</button>
        <button class="angka" onclick="inputAngka('3')">3</button>
        <button class="operator" onclick="inputAngka('.')">.</button>

        <button class="angka" style="grid-column: span 2;" onclick="inputAngka('0')">0</button>
        <button class="equal" onclick="hitung()">=</button>
    </div>

</div>

<script>
let ekspresi = "";

function inputAngka(angka) {
    ekspresi += angka;
    document.getElementById("hasil").textContent = ekspresi;
}

function clearAll() {
    ekspresi = "";
    document.getElementById("hasil").textContent = "0";
    document.getElementById("history").textContent = "";
}

function hapusSatu() {
    ekspresi = ekspresi.slice(0, -1);
    document.getElementById("hasil").textContent = ekspresi || "0";
}

function hitung() {
    try {
        let hasil = eval(ekspresi);

        document.getElementById("history").textContent = ekspresi + " =";
        document.getElementById("hasil").textContent = hasil;

        ekspresi = hasil.toString();

    } catch {
        alert("Input tidak valid!");
    }
}
</script>

</body>
</html>
