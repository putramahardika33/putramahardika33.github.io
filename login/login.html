<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Notif</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.login-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

.password-box {
    position: relative;
}

.password-box input {
    width: 100%;
    padding: 10px;
    padding-right: 40px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group password-box">
        <input type="password" id="password" placeholder="Password">
        <span class="eye" id="eyeIcon" onclick="lihatPassword()">🌚</span>
    </div>

    <button onclick="login()">LOGIN</button>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let usernameBenar = "gerend";
    let passwordBenar = "209817";

    if (user === usernameBenar && pass === passwordBenar) {
        alert("✅ Login Berhasil");
    } else {
        alert("❌ Login Gagal");
    }
}

// toggle password + icon
function lihatPassword() {
    let passInput = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if (passInput.type === "password") {
        passInput.type = "text";
        icon.innerText = "🌝"; // mata terbuka
    } else {
        passInput.type = "password";
        icon.innerText = "🌚"; // mata tertutup
    }
}
</script>

</body>
</html>
